<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b2933d" />
      <stop offset="50%" stop-color="#e8c96d" />
      <stop offset="100%" stop-color="#c9a84c" />
    </linearGradient>
  </defs>
  <!-- Crown / Monogram Crest -->
  <g transform="translate(10, 15)">
    <!-- Stylized Diamond Shield -->
    <path d="M 60 10 L 110 50 L 60 110 L 10 50 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
    <path d="M 60 20 L 95 50 L 60 95 L 25 50 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="3,3" />
    
    <!-- Stylized Luxury P / V monogram -->
    <!-- Letter P -->
    <path d="M 50 40 L 50 80 M 50 40 L 68 40 C 76 40, 76 56, 68 56 L 50 56" fill="none" stroke="url(#goldGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Letter V -->
    <path d="M 54 62 L 62 80 L 74 44" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Top Crown Accent -->
    <path d="M 45 5 L 60 13 L 75 5 L 68 18 L 52 18 Z" fill="url(#goldGrad)" />
  </g>
  
  <!-- Text Content -->
  <text x="145" y="65" font-family="'Playfair Display', 'Times New Roman', serif" font-size="28" font-weight="bold" fill="url(#goldGrad)" letter-spacing="4">PRESTIGE VTC</text>
  <text x="145" y="98" font-family="'Outfit', 'Helvetica', sans-serif" font-size="13" font-weight="500" fill="#ffffff" letter-spacing="9">S T R A S B O U R G</text>
  <line x1="145" y1="78" x2="390" y2="78" stroke="rgba(201, 168, 76, 0.3)" stroke-width="1" />
</svg>
